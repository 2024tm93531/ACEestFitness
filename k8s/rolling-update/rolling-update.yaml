# ─────────────────────────────────────────────
# ROLLING UPDATE STRATEGY
#
# Kubernetes default strategy — replaces pods incrementally.
# Ensures zero downtime by keeping some pods running at all times.
#
# Key parameters:
#   maxSurge:        1 extra pod beyond desired count during update
#   maxUnavailable:  0 — no pod goes down until replacement is ready
#
# Usage:
#   Deploy:  kubectl apply -f rolling-update.yaml
#   Trigger: kubectl set image deploy/aceest-rolling aceest-app=IMAGE:NEWTAG -n aceest
#   Watch:   kubectl rollout status deployment/aceest-rolling -n aceest
#   Undo:    kubectl rollout undo deployment/aceest-rolling -n aceest
# ─────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-rolling
  namespace: aceest
  labels:
    app: aceest-fitness
    strategy: rolling-update
  annotations:
    kubernetes.io/change-cause: "Initial rolling deployment - v2.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-fitness
      strategy: rolling-update
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1            # Allow 1 extra pod during update (4 pods momentarily)
      maxUnavailable: 0      # Never reduce below desired count (zero downtime)
  template:
    metadata:
      labels:
        app: aceest-fitness
        strategy: rolling-update
    spec:
      terminationGracePeriodSeconds: 30     # Allow in-flight requests to finish
      containers:
        - name: aceest-app
          image: 2024tm93531/aceest-fitness:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-config
            - secretRef:
                name: aceest-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]   # Drain in-flight requests
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
# HorizontalPodAutoscaler — scales between 2 and 8 replicas based on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aceest-rolling-hpa
  namespace: aceest
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aceest-rolling
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# Service for rolling update deployment
apiVersion: v1
kind: Service
metadata:
  name: aceest-rolling-service
  namespace: aceest
  labels:
    app: aceest-fitness
    strategy: rolling-update
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    strategy: rolling-update
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30084
