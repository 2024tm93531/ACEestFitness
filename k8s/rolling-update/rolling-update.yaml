# k8s/rolling-update/rolling-update.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-rolling
  namespace: aceest
  labels:
    app: aceest-fitness
    strategy: rolling-update
spec:
  replicas: 1               
  selector:
    matchLabels:
      app: aceest-fitness
      strategy: rolling-update
  strategy:
    type: Recreate          # MUST be Recreate so the old pod releases the SQLite PVC lock
  template:
    metadata:
      labels:
        app: aceest-fitness
        strategy: rolling-update
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: aceest-app
          image: 2024tm93531/aceest-fitness:latest
          ports:
            - containerPort: 5000
          # --- ADDED: Mount the SQLite Database Volume ---
          volumeMounts:
            - name: db-volume
              mountPath: /data
          envFrom:
            - configMapRef:
                name: aceest-config
            - secretRef:
                name: aceest-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      # --- ADDED: Reference the PVC ---
      volumes:
        - name: db-volume
          persistentVolumeClaim:
            claimName: sqlite-data
---
# Service for rolling update deployment
apiVersion: v1
kind: Service
metadata:
  name: aceest-rolling-service
  namespace: aceest
  labels:
    app: aceest-fitness
    strategy: rolling-update
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    strategy: rolling-update
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30084