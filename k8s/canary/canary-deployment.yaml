# ─────────────────────────────────────────────
# CANARY RELEASE STRATEGY
#
# Traffic split via replica ratio:
#   stable:  9 replicas  → ~90% of traffic
#   canary:  1 replica   → ~10% of traffic
#
# Usage:
#   1. kubectl apply -f canary-deployment.yaml
#   2. Monitor canary: kubectl logs -l version=canary -n aceest
#   3. Promote:  scale canary to 9, delete stable, re-label canary→stable
#   4. Rollback: kubectl delete deploy aceest-canary -n aceest
# ─────────────────────────────────────────────

# Stable deployment (current production — 90% traffic)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
  namespace: aceest
  labels:
    app: aceest-fitness
    version: stable
    strategy: canary
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-fitness
      track: stable
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: stable
        version: stable
    spec:
      containers:
        - name: aceest-app
          image: 2024tm93531/aceest-fitness:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-config
            - secretRef:
                name: aceest-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
# Canary deployment (new version — 10% traffic)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
  namespace: aceest
  labels:
    app: aceest-fitness
    version: canary
    strategy: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
      track: canary
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: canary
        version: canary
    spec:
      containers:
        - name: aceest-app
          image: 2024tm93531/aceest-fitness:canary
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-config
            - secretRef:
                name: aceest-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
# Shared service — routes to both stable and canary pods (proportional to replicas)
apiVersion: v1
kind: Service
metadata:
  name: aceest-canary-service
  namespace: aceest
  labels:
    app: aceest-fitness
    strategy: canary
spec:
  type: NodePort
  selector:
    app: aceest-fitness        # Selects BOTH stable and canary pods
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30082
