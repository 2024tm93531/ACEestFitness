# ─────────────────────────────────────────────
# BLUE-GREEN DEPLOYMENT STRATEGY
# Blue = current stable version (live traffic)
# Green = new version (staged, tested, then switched)
#
# Usage:
#   1. Deploy blue:   kubectl apply -f blue-deployment.yaml
#   2. Deploy green:  kubectl apply -f green-deployment.yaml
#   3. Test green via: kubectl port-forward svc/aceest-green 5001:5000
#   4. Switch traffic: kubectl apply -f service-switch.yaml  (points to green)
#   5. Rollback:       edit service-switch.yaml selector back to blue
# ─────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-blue
  namespace: aceest
  labels:
    app: aceest-fitness
    version: blue
    strategy: blue-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      version: blue
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: blue
    spec:
      containers:
        - name: aceest-app
          image: 2024tm93531/aceest-fitness:blue
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-config
            - secretRef:
                name: aceest-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
