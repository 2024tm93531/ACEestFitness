# k8s/blue-green/blue-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-blue
  namespace: aceest
  labels:
    app: aceest-fitness
    version: blue
    strategy: blue-green
spec:
  replicas: 1               # Reduced to 1 for SQLite
  selector:
    matchLabels:
      app: aceest-fitness
      version: blue
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: blue
    spec:
      containers:
        - name: aceest-app
          image: 2024tm93531/aceest-fitness:blue
          ports:
            - containerPort: 5000
          # --- ADDED: Volume Mount ---
          volumeMounts:
            - name: db-volume
              mountPath: /data
          envFrom:
            - configMapRef:
                name: aceest-config
            - secretRef:
                name: aceest-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: db-volume
          persistentVolumeClaim:
            claimName: sqlite-data