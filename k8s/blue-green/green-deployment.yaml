# k8s/blue-green/green-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
  namespace: aceest
  labels:
    app: aceest-fitness
    version: green
    strategy: blue-green
spec:
  replicas: 2              
  selector:
    matchLabels:
      app: aceest-fitness
      version: green
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: green
    spec:
      containers:
        - name: aceest-app
          image: 2024tm93531/aceest-fitness:green
          ports:
            - containerPort: 5000
          # --- ADDED: Volume Mount ---
          volumeMounts:
            - name: db-volume
              mountPath: /data
          envFrom:
            - configMapRef:
                name: aceest-config
            - secretRef:
                name: aceest-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: db-volume
          persistentVolumeClaim:
            claimName: sqlite-data