# ─────────────────────────────────────────────
# Blue-Green Service Switch
# Change `version: blue` → `version: green` to cut over traffic.
# Revert back to `version: blue` for instant rollback.
# ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: aceest-service
  namespace: aceest
  labels:
    app: aceest-fitness
    strategy: blue-green
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    version: blue          # ← Change to "green" to switch traffic
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30080
---
# Staging service — always points at green for validation before switch
apiVersion: v1
kind: Service
metadata:
  name: aceest-green-staging
  namespace: aceest
  labels:
    app: aceest-fitness
    role: staging
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    version: green
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30081
