# ─────────────────────────────────────────────
# SHADOW DEPLOYMENT STRATEGY
#
# Production handles all real traffic.
# Shadow receives mirrored (duplicate) traffic for testing.
# Users never see shadow responses — it's purely observational.
#
# Traffic mirroring is achieved via an Nginx sidecar or
# a service mesh (Istio). This manifest uses an Nginx sidecar
# approach for environments without a service mesh.
#
# Usage:
#   kubectl apply -f shadow-deployment.yaml
#   Watch shadow logs: kubectl logs -l version=shadow -c shadow-app -n aceest
# ─────────────────────────────────────────────

# Production Deployment (live traffic)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-production
  namespace: aceest
  labels:
    app: aceest-fitness
    version: production
    strategy: shadow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      version: production
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: production
    spec:
      containers:
        - name: aceest-app
          image: 2024tm93531/aceest-fitness:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-config
            - secretRef:
                name: aceest-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
        # ── Nginx sidecar: mirrors incoming requests to the shadow service ──
        - name: traffic-mirror
          image: nginx:alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-config
          configMap:
            name: shadow-nginx-config
---
# Shadow Deployment (receives mirrored traffic — no user impact)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-shadow
  namespace: aceest
  labels:
    app: aceest-fitness
    version: shadow
    strategy: shadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
      version: shadow
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: shadow
    spec:
      containers:
        - name: shadow-app
          image: 2024tm93531/aceest-fitness:shadow
          ports:
            - containerPort: 5000
          env:
            - name: SHADOW_MODE
              value: "true"          # App can log shadow traffic distinctly
          envFrom:
            - configMapRef:
                name: aceest-config
            - secretRef:
                name: aceest-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
# Nginx ConfigMap — mirrors 100% of requests to shadow service
apiVersion: v1
kind: ConfigMap
metadata:
  name: shadow-nginx-config
  namespace: aceest
data:
  mirror.conf: |
    server {
        listen 8080;
        location / {
            proxy_pass http://aceest-production-service:5000;
            # Mirror copy of every request to the shadow service
            mirror /shadow;
            mirror_request_body on;
        }
        location /shadow {
            internal;
            proxy_pass http://aceest-shadow-service:5000$request_uri;
        }
    }
---
# Production Service
apiVersion: v1
kind: Service
metadata:
  name: aceest-production-service
  namespace: aceest
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    version: production
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30083
---
# Shadow Service (internal — not exposed to end users)
apiVersion: v1
kind: Service
metadata:
  name: aceest-shadow-service
  namespace: aceest
spec:
  type: ClusterIP
  selector:
    app: aceest-fitness
    version: shadow
  ports:
    - port: 5000
      targetPort: 5000
