# ─────────────────────────────────────────────
# SonarQube Project Configuration
# Run: sonar-scanner (from project root)
# ─────────────────────────────────────────────

# Project identification
sonar.projectKey=aceest-fitness
sonar.projectName=ACEest Fitness & Gym
sonar.projectVersion=2.0.0

# Source and test directories
sonar.sources=.
sonar.inclusions=app.py
sonar.exclusions=**/tests/**,**/venv/**,**/__pycache__/**,**/migrations/**

# Test configuration
sonar.tests=tests
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Language
sonar.language=py

# Quality Gate — fail build if any of these are breached
# (configured via SonarQube UI → Quality Gates)
sonar.qualitygate.wait=true

# SonarQube server (override via environment variable SONAR_HOST_URL)
# sonar.host.url=http://localhost:9000
# sonar.login=${SONAR_TOKEN}
