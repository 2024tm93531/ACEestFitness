# .github/workflows/main.yml
# ─────────────────────────────────────────────
# ACEest Fitness — CI/CD Pipeline
# Triggers on every push and pull request
# ─────────────────────────────────────────────

name: ACEest CI/CD Pipeline

on:
  push:
    branches: [ "**" ]        # Run on every branch push
  pull_request:
    branches: [ main, develop ] # Run on PRs targeting main/master

jobs:

  # ── JOB 1: Lint & Build ────────────────────
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint — check for Python syntax errors
        run: |
          python -m py_compile app.py
          echo "✅ No syntax errors found in app.py"

  # ── JOB 2: Run Tests ───────────────────────
  test:
    name: Run Pytest Suite
    runs-on: ubuntu-latest
    needs: build-and-lint     # Only run if lint job passed

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with pytest
        run: |
          pytest tests/test_app.py -v --tb=short

  # ── JOB 3: Build Docker Image ──────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test               # Only build Docker if tests passed

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t aceest-fitness:latest .
          echo "✅ Docker image built successfully"

      - name: Run tests inside Docker container
        run: |
          docker run --rm \
            -e DB_PATH=":memory:" \
            aceest-fitness:latest \
            python -m pytest tests/test_app.py -v --tb=short
