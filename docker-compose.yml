version: '3.8'

services:
  aceest-fitness:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - aceest_data:/data
      - ./aceest_fitness.db:/app/aceest_fitness.db
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=aceest-secret-2025
      - DB_PATH=/app/aceest_fitness.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  aceest_data:
