{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <h1>Edit Client: {{ client.name }}</h1>
  <a href="{{ url_for('client_detail', name=client.name) }}" class="btn btn-outline">← Cancel</a>
</div>

<div class="card" style="max-width:700px;">
  <form method="POST" action="{{ url_for('edit_client', name=client.name) }}">
    <div class="grid-2">
      <div class="form-group">
        <label>Age</label>
        <input name="age" type="number" class="form-control" value="{{ client.age or '' }}"/>
      </div>
      <div class="form-group">
        <label>Height (cm)</label>
        <input name="height" type="number" step="0.1" class="form-control" value="{{ client.height or '' }}"/>
      </div>
      <div class="form-group">
        <label>Current Weight (kg)</label>
        <input name="weight" type="number" step="0.1" class="form-control" value="{{ client.weight or '' }}"/>
      </div>
      <div class="form-group">
        <label>Fitness Program</label>
        <select name="program" class="form-control">
          <option value="">— Select —</option>
          {% for prog_name in programs %}
          <option value="{{ prog_name }}" {% if client.program == prog_name %}selected{% endif %}>
            {{ prog_name }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Target Weight (kg)</label>
        <input name="target_weight" type="number" step="0.1" class="form-control" value="{{ client.target_weight or '' }}"/>
      </div>
      <div class="form-group">
        <label>Target Adherence (%)</label>
        <input name="target_adherence" type="number" min="0" max="100" class="form-control" value="{{ client.target_adherence or '' }}"/>
      </div>
      <div class="form-group">
        <label>Membership Status</label>
        <select name="membership_status" class="form-control">
          <option value="Active"   {% if client.membership_status == 'Active'   %}selected{% endif %}>Active</option>
          <option value="Inactive" {% if client.membership_status == 'Inactive' %}selected{% endif %}>Inactive</option>
          <option value="Expired"  {% if client.membership_status == 'Expired'  %}selected{% endif %}>Expired</option>
        </select>
      </div>
      <div class="form-group">
        <label>Membership End Date</label>
        <input name="membership_end" type="date" class="form-control" value="{{ client.membership_end or '' }}"/>
      </div>
    </div>
    <button type="submit" class="btn btn-gold" style="width:100%; padding:0.75rem; font-size:1rem;">
      Save Changes
    </button>
  </form>
</div>

{% endblock %}
