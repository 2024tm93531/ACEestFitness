{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <h1>Add New Client</h1>
  <a href="{{ url_for('dashboard') }}" class="btn btn-outline">← Back</a>
</div>

<div class="card" style="max-width:700px;">
  <form method="POST" action="{{ url_for('add_client') }}">
    <div class="grid-2">
      <div class="form-group">
        <label>Full Name *</label>
        <input name="name" type="text" class="form-control" placeholder="e.g. Ravi Kumar" required/>
      </div>
      <div class="form-group">
        <label>Age</label>
        <input name="age" type="number" class="form-control" min="10" max="100" placeholder="28"/>
      </div>
      <div class="form-group">
        <label>Height (cm)</label>
        <input name="height" type="number" step="0.1" class="form-control" placeholder="175.0"/>
      </div>
      <div class="form-group">
        <label>Current Weight (kg)</label>
        <input name="weight" type="number" step="0.1" class="form-control" placeholder="75.0"/>
      </div>
      <div class="form-group">
        <label>Fitness Program</label>
        <select name="program" class="form-control">
          <option value="">— Select Program —</option>
          {% for prog_name in programs %}
          <option value="{{ prog_name }}">{{ prog_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Target Weight (kg)</label>
        <input name="target_weight" type="number" step="0.1" class="form-control" placeholder="68.0"/>
      </div>
      <div class="form-group">
        <label>Target Adherence (%)</label>
        <input name="target_adherence" type="number" min="0" max="100" class="form-control" placeholder="80"/>
      </div>
      <div class="form-group">
        <label>Membership End Date</label>
        <input name="membership_end" type="date" class="form-control"/>
      </div>
    </div>
    <button type="submit" class="btn btn-gold" style="width:100%; padding:0.75rem; font-size:1rem;">
      Save Client
    </button>
  </form>
</div>

<!-- Program Reference Cards -->
<div class="card">
  <h2>Program Reference</h2>
  <div class="grid-3">
    {% for prog_name, info in programs.items() %}
    <div style="background:#2a2a2a; border-radius:8px; padding:1rem;">
      <h3 style="color:#d4af37; margin-bottom:0.5rem;">{{ prog_name }}</h3>
      <p style="font-size:0.75rem; color:#888; margin-bottom:0.5rem;">
        Calorie factor: {{ info.factor }} kcal/kg
      </p>
      <p style="font-size:0.8rem; white-space:pre-line; color:#ccc;">{{ info.workout }}</p>
    </div>
    {% endfor %}
  </div>
</div>

{% endblock %}
